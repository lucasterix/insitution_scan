{% extends "base.html" %}
{% block title %}Neuer Scan{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">Neuen Scan anlegen</h1>

  <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-6 text-sm text-amber-900">
    <strong>⚠️ Nur eigene Systeme scannen.</strong> Du bestätigst, dass du Inhaber oder berechtigter Betreiber der angegebenen Domain bist.
  </div>

  <form method="post" action="/scans" class="bg-white border border-slate-200 rounded-xl p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Name der Institution</label>
      <input type="text" name="institution_name" required
             class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
             placeholder="z.B. MVZ Musterstadt">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Domain</label>
      <input type="text" name="target_domain" required
             class="w-full px-3 py-2 border border-slate-300 rounded-lg font-mono focus:outline-none focus:ring-2 focus:ring-emerald-500"
             placeholder="beispiel.de">
      <p class="text-xs text-slate-500 mt-1">Nur die Domain, ohne http:// oder Pfade.</p>
    </div>
    <div class="flex gap-3 pt-2">
      <button type="submit" class="px-5 py-2.5 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">Scan starten</button>
      <a href="/" class="px-5 py-2.5 border border-slate-300 rounded-lg hover:bg-slate-50">Abbrechen</a>
    </div>
  </form>
</div>
{% endblock %}

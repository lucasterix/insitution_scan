{% extends "base.html" %}
{% block title %}Scan {{ scan.target_domain }}{% endblock %}
{% block content %}
<div class="mb-6 flex items-start justify-between gap-4">
  <div>
    <a href="/" class="text-sm text-slate-500 hover:text-slate-700">← Alle Scans</a>
    <h1 class="text-2xl font-bold mt-1">{{ scan.institution_name }}</h1>
    <p class="font-mono text-slate-600">{{ scan.target_domain }}</p>
  </div>
  <button
    type="button"
    hx-post="/scans/{{ scan.id }}/delete"
    hx-confirm="Scan wirklich löschen? Falls noch laufend, wird der Job abgebrochen."
    hx-target="body"
    hx-swap="none"
    hx-on::after-request="if(event.detail.successful) window.location.href='/'"
    class="flex-shrink-0 inline-flex items-center gap-2 px-3 py-2 text-sm rounded-lg text-rose-600 border border-rose-200 hover:bg-rose-50 transition"
    title="Scan löschen / abbrechen"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
    {% if scan.status in ['queued', 'running'] %}Abbrechen{% else %}Löschen{% endif %}
  </button>
</div>

<div id="scan-status"
     {% if scan.status in ['queued', 'running'] %}
     hx-get="/scans/{{ scan.id }}/status"
     hx-trigger="load, every 2s"
     hx-swap="outerHTML"
     {% endif %}>
  {% include "partials/scan_status.html" %}
</div>
{% endblock %}

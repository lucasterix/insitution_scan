{% extends "base.html" %}
{% block title %}Scan {{ scan.target_domain }}{% endblock %}
{% block content %}
<div class="mb-6">
  <a href="/" class="text-sm text-slate-500 hover:text-slate-700">← Alle Scans</a>
  <h1 class="text-2xl font-bold mt-1">{{ scan.institution_name }}</h1>
  <p class="font-mono text-slate-600">{{ scan.target_domain }}</p>
</div>

<div id="scan-status"
     {% if scan.status in ['queued', 'running'] %}
     hx-get="/scans/{{ scan.id }}/status"
     hx-trigger="load, every 2s"
     hx-swap="outerHTML"
     {% endif %}>
  {% include "partials/scan_status.html" %}
</div>
{% endblock %}

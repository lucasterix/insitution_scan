services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: scan
    volumes:
      - /opt/institutionscan/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scan"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /opt/institutionscan/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+asyncpg://scan:${POSTGRES_PASSWORD}@postgres:5432/scan
      REDIS_URL: redis://redis:6379/0
      PUBLIC_BASE_URL: https://scan.zdkg.de
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      HIBP_API_KEY: ${HIBP_API_KEY:-}
      LEAKCHECK_API_KEY: ${LEAKCHECK_API_KEY:-}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      HUNTER_API_KEY: ${HUNTER_API_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO:-}
      IMAP_HOST: ${IMAP_HOST:-imap.gmail.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_FOLDER: ${IMAP_FOLDER:-INBOX}
      IMAP_POLL_SECONDS: ${IMAP_POLL_SECONDS:-120}
      IMAP_LOOKBACK_DAYS: ${IMAP_LOOKBACK_DAYS:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8090:8000"

  worker:
    image: ${APP_IMAGE}
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://scan:${POSTGRES_PASSWORD}@postgres:5432/scan
      REDIS_URL: redis://redis:6379/0
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      HIBP_API_KEY: ${HIBP_API_KEY:-}
      LEAKCHECK_API_KEY: ${LEAKCHECK_API_KEY:-}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      HUNTER_API_KEY: ${HUNTER_API_KEY:-}
      OTX_API_KEY: ${OTX_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # IMAP polling daemon — fetches replies/inbound mail, matches them to scans.
  poller:
    image: ${APP_IMAGE}
    restart: unless-stopped
    command: ["python", "-m", "app.imap_poller"]
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://scan:${POSTGRES_PASSWORD}@postgres:5432/scan
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      IMAP_HOST: ${IMAP_HOST:-imap.gmail.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_FOLDER: ${IMAP_FOLDER:-INBOX}
      IMAP_POLL_SECONDS: ${IMAP_POLL_SECONDS:-120}
      IMAP_LOOKBACK_DAYS: ${IMAP_LOOKBACK_DAYS:-60}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
    depends_on:
      postgres:
        condition: service_healthy
